name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to GitHub Container Registry
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build backend image
      - name: Build backend image
        run: |
          docker build -t ghcr.io/${{ github.repository }}-backend:latest ./backend

      # Build frontend image
      - name: Build frontend image
        run: |
          docker build -t ghcr.io/${{ github.repository }}-frontend:latest ./frontend

      # Push images
      - name: Push backend image
        run: docker push ghcr.io/${{ github.repository }}-backend:latest

      - name: Push frontend image
        run: docker push ghcr.io/${{ github.repository }}-frontend:latest

      # Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd projectroot
            docker compose down
            git pull
            docker compose up -d --build